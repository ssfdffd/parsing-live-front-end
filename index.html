<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parsing Live - WebRTC</title>
    
    <!-- FAVICON PLACEHOLDER: Replace 'YOUR_FAVICON.ico' with your actual file name -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="obsidian-bg">

    <header class="app-header">
        <h1 class="cream-text">Parsing<span class="coral-pink-text">™</span> Live</h1>
    </header>

    <main class="video-grid-container">
        <!-- Local Video -->
        <div class="video-tile" id="local-video-tile">
            <video id="local-video" autoplay muted playsinline></video>
            <span class="participant-name cream-text">You</span>
        </div>
        
        <!-- Remote Videos will be injected here by JavaScript -->
        <div id="remote-videos-container"></div>
    </main>

    <footer class="control-bar graphite-bg">
        <button id="btn-mic" class="control-btn active" title="Toggle Microphone">🎤</button>
        <button id="btn-cam" class="control-btn active" title="Toggle Camera">📹</button>
        <button id="btn-leave" class="control-btn leave-btn" title="Leave Call">📞</button>
    </footer>

    <script src="script.js"></script>
</body>
</html>
